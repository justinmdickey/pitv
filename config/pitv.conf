# PiTV Player Configuration
# This file is sourced by pitv-player.sh

# Directory containing transcoded video files
VIDEO_DIR="/home/pi/pitv/videos"

# Supported file extensions (space-separated)
VIDEO_EXTENSIONS="mp4 mkv avi m4v"

# Shuffle playback order (true/false)
SHUFFLE=false

# Seconds to wait before restarting after player exit/crash
RESTART_DELAY=3

# Seconds to wait on boot for composite video to initialize
BOOT_DELAY=5

# Seconds to wait before retrying when no videos are found
NO_VIDEO_RETRY=30
